    d_in: 0.55
    d_out: 0.45
  parent_id: Y_right_lower_G3
  parent_port_index: 1

- id: right_lower_G4_b
  kind: pipe
  params:
    length: 1.3
    d_in: 0.53
    d_out: 0.44
  parent_id: Y_right_lower_G3
  parent_port_index: 2

- id: left_upper_G4_a
  kind: pipe
  params:
    length: 1.3
    d_in: 0.56
    d_out: 0.45
  parent_id: Y_left_upper_G3
  parent_port_index: 1

- id: left_upper_G4_b
  kind: pipe
  params:
    length: 1.2
    d_in: 0.54
    d_out: 0.44
  parent_id: Y_left_upper_G3
  parent_port_index: 2

- id: left_lower_G4_a
  kind: pipe
  params:
    length: 1.4
    d_in: 0.54
    d_out: 0.44
  parent_id: Y_left_lower_G3
