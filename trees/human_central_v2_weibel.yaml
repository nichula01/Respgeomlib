# Central human airway model v2 (Weibel-like early generations)
# Units: centimetres (cm); angles in degrees. Trachea aligns with +z.
# Topology: trachea → main carina (Y2) → lobar bronchi (Y3 right, Y2 left)
# → one additional bifurcation in each lobe (Y2) → two terminal pipes per lobe.

# Generation 0 – trachea
- id: trachea
  kind: pipe
  params:
    length: 12.0     # tracheal length ~12 cm
    d_in: 1.8        # tracheal diameter ~1.8 cm
    d_out: 1.8
  parent_id: null
  parent_port_index: null

# Generation 1 – main carina
- id: Y_main
  kind: y2
  params:
    length_trunk: 2.0
    length_child1: 4.5   # right main bronchus
    length_child2: 5.0   # left main bronchus
    d_trunk: 1.8
    d_child1: 1.25
    d_child2: 1.20
    theta1_deg: 38.0
    phi1_deg: -25.0      # rightward, slightly anterior
    theta2_deg: 40.0
    phi2_deg: 155.0      # leftward
  parent_id: trachea
  parent_port_index: 1

# Generation 2 – right main → 3 lobar bronchi
- id: Y_right_lobes
  kind: y3
  params:
    length_trunk: 1.2
    length_child1: 2.5   # right upper lobe
    length_child2: 2.3   # right middle lobe
    length_child3: 2.8   # right lower lobe
    d_trunk: 1.25
    d_child1: 0.95
    d_child2: 0.85
    d_child3: 0.90
    theta1_deg: 32.0
    phi1_deg: 20.0
    theta2_deg: 34.0
    phi2_deg: -60.0
    theta3_deg: 36.0
    phi3_deg: 80.0
  parent_id: Y_main
  parent_port_index: 1

# Generation 2 – left main → 2 lobar bronchi
- id: Y_left_lobes
  kind: y2
  params:
    length_trunk: 1.5
    length_child1: 2.6   # left upper lobe
    length_child2: 2.9   # left lower lobe
    d_trunk: 1.20
    d_child1: 0.95
    d_child2: 0.90
    theta1_deg: 34.0
    phi1_deg: 25.0
    theta2_deg: 36.0
    phi2_deg: 205.0
  parent_id: Y_main
  parent_port_index: 2

# Generation 3 – one bifurcation inside each lobe
- id: Y_right_upper_G3
  kind: y2
  params:
    length_trunk: 0.8
    length_child1: 1.5
    length_child2: 1.4
    d_trunk: 0.95
    d_child1: 0.56
    d_child2: 0.54
    theta1_deg: 35.0
    phi1_deg: 15.0
    theta2_deg: 37.0
    phi2_deg: -35.0
  parent_id: Y_right_lobes
  parent_port_index: 1

- id: Y_right_middle_G3
  kind: y2
  params:
    length_trunk: 0.7
    length_child1: 1.4
    length_child2: 1.3
    d_trunk: 0.85
    d_child1: 0.53
    d_child2: 0.50
    theta1_deg: 35.0
    phi1_deg: -20.0
    theta2_deg: 37.0
    phi2_deg: -80.0
  parent_id: Y_right_lobes
  parent_port_index: 2

- id: Y_right_lower_G3
  kind: y2
  params:
    length_trunk: 0.8
    length_child1: 1.6
    length_child2: 1.5
    d_trunk: 0.90
    d_child1: 0.55
    d_child2: 0.53
    theta1_deg: 36.0
    phi1_deg: 70.0
    theta2_deg: 38.0
    phi2_deg: 130.0
  parent_id: Y_right_lobes
  parent_port_index: 3

- id: Y_left_upper_G3
  kind: y2
  params:
    length_trunk: 0.8
    length_child1: 1.6
    length_child2: 1.4
    d_trunk: 0.95
    d_child1: 0.56
    d_child2: 0.54
    theta1_deg: 35.0
    phi1_deg: 30.0
    theta2_deg: 37.0
    phi2_deg: -40.0
  parent_id: Y_left_lobes
  parent_port_index: 1

- id: Y_left_lower_G3
  kind: y2
  params:
    length_trunk: 0.8
    length_child1: 1.6
    length_child2: 1.5
    d_trunk: 0.90
    d_child1: 0.54
    d_child2: 0.52
    theta1_deg: 36.0
    phi1_deg: 190.0
    theta2_deg: 38.0
    phi2_deg: 240.0
  parent_id: Y_left_lobes
  parent_port_index: 2

# Generation 4 – terminal pipes from each lobar sub-branch
- id: right_upper_G4_a
  kind: pipe
  params:
    length: 1.3
    d_in: 0.56
    d_out: 0.45
  parent_id: Y_right_upper_G3
  parent_port_index: 1

- id: right_upper_G4_b
  kind: pipe
  params:
    length: 1.2
    d_in: 0.54
    d_out: 0.44
  parent_id: Y_right_upper_G3
  parent_port_index: 2

- id: right_middle_G4_a
  kind: pipe
  params:
    length: 1.2
    d_in: 0.53
    d_out: 0.43
  parent_id: Y_right_middle_G3
  parent_port_index: 1

- id: right_middle_G4_b
  kind: pipe
  params:
    length: 1.1
